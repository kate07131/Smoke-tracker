<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>흡연 트래커 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e0e0e0; font-family: 'Pretendard', sans-serif; min-height: 100vh; }
  .header { background: #1a1d2e; padding: 24px 32px; border-bottom: 1px solid #2a2d3e; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  .header span { font-size: 13px; color: #888; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: #1a1d2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2d3e; }
  .stat-card .label { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 32px; font-weight: 700; color: #fff; }
  .stat-card .sub { font-size: 12px; color: #666; margin-top: 4px; }
  .section { background: #1a1d2e; border-radius: 12px; padding: 24px; border: 1px solid #2a2d3e; margin-bottom: 24px; }
  .section h2 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; color: #888; font-weight: 500; border-bottom: 1px solid #2a2d3e; font-size: 12px; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid #1e2030; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2235; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-high { background: #3d1a1a; color: #ff6b6b; }
  .badge-mid { background: #3d2d1a; color: #ffa94d; }
  .badge-low { background: #1a3d2d; color: #51cf66; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-primary { background: #4361ee; color: #fff; }
  .btn-primary:hover { background: #3451d1; }
  .btn-outline { background: transparent; color: #888; border: 1px solid #2a2d3e; }
  .btn-outline:hover { color: #fff; border-color: #4361ee; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  select, input[type="date"] { background: #0f1117; border: 1px solid #2a2d3e; color: #e0e0e0; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
  .chart-wrap { position: relative; height: 260px; }
  .loading { text-align: center; padding: 48px; color: #888; }
  .refresh-btn { font-size: 12px; }
  .participant-bar { height: 6px; background: #2a2d3e; border-radius: 3px; margin-top: 6px; }
  .participant-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4361ee, #f72585); transition: width 0.5s; }
  .empty { text-align: center; padding: 32px; color: #555; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>🚬 흡연 트래커 관리자</h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <span id="last-updated">로딩 중...</span>
    <button class="btn btn-primary refresh-btn" onclick="loadAll()">새로고침</button>
    <button class="btn btn-outline" onclick="exportCSV()">CSV 다운로드</button>
  </div>
</div>

<div class="container">

  <!-- 통계 카드 -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">전체 참여자</div>
      <div class="value" id="stat-participants">-</div>
      <div class="sub">명</div>
    </div>
    <div class="stat-card">
      <div class="label">전체 흡연 기록</div>
      <div class="value" id="stat-total">-</div>
      <div class="sub">건</div>
    </div>
    <div class="stat-card">
      <div class="label">오늘 전체 흡연</div>
      <div class="value" id="stat-today">-</div>
      <div class="sub">건</div>
    </div>
    <div class="stat-card">
      <div class="label">1인 일평균</div>
      <div class="value" id="stat-avg">-</div>
      <div class="sub">개비</div>
    </div>
  </div>

  <!-- 필터 -->
  <div class="top-bar">
    <div class="filter-bar">
      <select id="filter-name" onchange="renderAll()">
        <option value="">전체 참여자</option>
      </select>
      <input type="date" id="filter-from" onchange="renderAll()">
      <span style="color:#666;line-height:36px;">~</span>
      <input type="date" id="filter-to" onchange="renderAll()">
      <button class="btn btn-outline" onclick="resetFilter()">초기화</button>
    </div>
  </div>

  <!-- 날짜별 그래프 -->
  <div class="section">
    <h2>📈 날짜별 흡연량</h2>
    <div class="chart-wrap">
      <canvas id="chart-daily"></canvas>
    </div>
  </div>

  <!-- 참여자별 현황 -->
  <div class="section">
    <h2>👥 참여자별 현황</h2>
    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>전체 기록</th>
          <th>오늘</th>
          <th>일평균</th>
          <th>최근 흡연</th>
          <th>수준</th>
        </tr>
      </thead>
      <tbody id="table-participants">
        <tr><td colspan="6" class="empty">데이터 로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 전체 기록 -->
  <div class="section">
    <h2>📋 전체 기록</h2>
    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>날짜</th>
          <th>시간</th>
        </tr>
      </thead>
      <tbody id="table-records">
        <tr><td colspan="3" class="empty">데이터 로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://fwgszqcctysxegvolftg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yRXq0ckkfqhDCVyhLKLaTQ_WGfvQ9U_';

let allData = [];
let dailyChart = null;

async function loadAll() {
  document.getElementById('last-updated').textContent = '로딩 중...';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/smoke_records?select=*&order=created_at.desc&limit=5000`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    allData = await res.json();
    document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
    updateNameFilter();
    renderAll();
  } catch(e) {
    document.getElementById('last-updated').textContent = '로딩 실패';
    console.error(e);
  }
}

function getFiltered() {
  const name = document.getElementById('filter-name').value;
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  return allData.filter(r => {
    if (name && r.name !== name) return false;
    if (from && r.date < from) return false;
    if (to && r.date > to) return false;
    return true;
  });
}

function todayKey() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function updateNameFilter() {
  const names = [...new Set(allData.map(r => r.name))].sort();
  const sel = document.getElementById('filter-name');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체 참여자</option>';
  names.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    if (n === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

function renderAll() {
  const data = getFiltered();
  const today = todayKey();

  // 통계 카드
  const names = [...new Set(allData.map(r => r.name))];
  document.getElementById('stat-participants').textContent = names.length;
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-today').textContent = allData.filter(r => r.date === today).length;

  // 일평균 계산
  if (allData.length > 0) {
    const dates = [...new Set(allData.map(r => r.date))];
    const avg = names.length > 0 ? (allData.length / (dates.length * names.length)).toFixed(1) : 0;
    document.getElementById('stat-avg').textContent = avg;
  }

  // 날짜별 그래프
  renderChart(data);

  // 참여자별 테이블
  renderParticipants(data);

  // 전체 기록 테이블
  renderRecords(data);
}

function renderChart(data) {
  const dateMap = {};
  data.forEach(r => {
    dateMap[r.date] = (dateMap[r.date] || 0) + 1;
  });
  const dates = Object.keys(dateMap).sort();
  const counts = dates.map(d => dateMap[d]);

  if (dailyChart) dailyChart.destroy();
  const ctx = document.getElementById('chart-daily').getContext('2d');
  dailyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dates.map(d => d.slice(5)),
      datasets: [{
        label: '흡연 횟수',
        data: counts,
        backgroundColor: 'rgba(67, 97, 238, 0.7)',
        borderColor: '#4361ee',
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#888' }, grid: { color: '#1e2030' } },
        y: { ticks: { color: '#888', stepSize: 1 }, grid: { color: '#1e2030' }, beginAtZero: true }
      }
    }
  });
}

function renderParticipants(data) {
  const today = todayKey();
  const names = [...new Set(allData.map(r => r.name))].sort();
  const maxTotal = Math.max(...names.map(n => allData.filter(r => r.name === n).length), 1);
  const tbody = document.getElementById('table-participants');

  if (names.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">데이터가 없습니다</td></tr>';
    return;
  }

  tbody.innerHTML = names.map(name => {
    const recs = allData.filter(r => r.name === name);
    const todayCount = recs.filter(r => r.date === today).length;
    const dates = [...new Set(recs.map(r => r.date))];
    const avg = dates.length > 0 ? (recs.length / dates.length).toFixed(1) : 0;
    const last = recs[0] ? `${recs[0].date} ${recs[0].time || ''}` : '-';
    const pct = Math.round((recs.length / maxTotal) * 100);
    const level = avg >= 15 ? ['high','높음'] : avg >= 8 ? ['mid','보통'] : ['low','낮음'];
    return `<tr>
      <td><strong>${name}</strong></td>
      <td>
        ${recs.length}건
        <div class="participant-bar"><div class="participant-bar-fill" style="width:${pct}%"></div></div>
      </td>
      <td>${todayCount}건</td>
      <td>${avg}개비</td>
      <td style="color:#888;font-size:12px">${last}</td>
      <td><span class="badge badge-${level[0]}">${level[1]}</span></td>
    </tr>`;
  }).join('');
}

function renderRecords(data) {
  const tbody = document.getElementById('table-records');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">데이터가 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = data.slice(0, 200).map(r => `
    <tr>
      <td>${r.name || '-'}</td>
      <td>${r.date || '-'}</td>
      <td>${r.time || '-'}</td>
    </tr>
  `).join('');
}

function resetFilter() {
  document.getElementById('filter-name').value = '';
  document.getElementById('filter-from').value = '';
  document.getElementById('filter-to').value = '';
  renderAll();
}

function exportCSV() {
  const data = getFiltered();
  const rows = [['이름','날짜','시간'], ...data.map(r => [r.name, r.date, r.time])];
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `흡연기록_${todayKey()}.csv`;
  a.click();
}

// 초기 로드 + 30초마다 자동 갱신
loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
